<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKO 鏡片代碼查詢系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        html, body { height: 100%; }
        body { font-size: 14px; }
        select, button, input { font-size: 14px !important; }
        #mainCard { transform-origin: center center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-full flex flex-col items-center justify-center p-2 sm:p-4 overflow-hidden">

    <div id="mainCard" class="bg-white p-3 sm:p-4 rounded-2xl shadow-xl w-full max-w-xl border border-slate-100 max-h-full overflow-y-auto">
        <h1 class="text-xl sm:text-2xl font-extrabold text-center text-blue-600 mb-3 tracking-wide">HKO 鏡片代碼查詢系統</h1>

        <!-- 所有步驟：動態注入 -->
        <div id="stepsContainer"></div>

        <!-- 結果顯示區域 -->
        <div class="mt-2.5 p-3 bg-slate-100 rounded-lg text-center hidden" id="resultBox">
            <div id="resultSingleWrapper">
                <p class="text-[15px] text-slate-500 font-semibold tracking-wider uppercase" id="resultLabel">對應 HKO 鏡片編號</p>
                <p class="text-2xl font-black text-slate-900 mt-1 tracking-wider select-all" id="resultCode">------</p>
            </div>
            <div id="resultTintedWrapper" class="hidden">
                <p class="text-[15px] text-slate-500 font-semibold tracking-wider uppercase">鏡片代碼</p>
                <p class="text-2xl font-black text-slate-900 mt-1 tracking-wider select-all" id="resultLensCode">------</p>
                <p class="text-[15px] text-slate-500 font-semibold tracking-wider uppercase mt-2">Owndays 顏色代碼</p>
                <p class="text-2xl font-black text-slate-900 mt-1 tracking-wider select-all" id="resultColorCode">------</p>
            </div>
            <p class="text-xs text-slate-500 mt-1" id="resultNote"></p>

            <button id="copyBtn" onclick="copyToClipboard()" class="mt-2 inline-flex items-center justify-center bg-slate-700 hover:bg-slate-800 text-white font-bold py-1.5 px-6 rounded-lg transition duration-150 text-sm cursor-pointer">
                <span id="copyBtnText">複製編號</span>
            </button>
        </div>
    </div>

<script>
    // ============================================================
    // HKO 鏡片代碼查詢系統 — 單一畫面統一版
    // 涵蓋：單光 (SV，含近視控制) / 漸進 (PAL) / PhotoShade / 染色鏡片 (Tinted)
    // 資料來源：無標題的試算表_-_HKO-3.pdf ＋ 原有 PhotoShade/染色鏡片資料
    // ⚠ 注意：174 RX UV420 Ext Cyl (JPN) 喺兩個來源入面有分歧
    //   PDF 試算表寫 XOD8ASBU3PE，另一份資料寫 XOD8ASBU3RE
    //   此工具暫用 PE，請人手核對後再用
    //
    // UI 流程 (2026-07 改版)：
    //   Step1 折射率 (1.6/1.67/1.74)
    //   Step2 鏡片系列 (單光 SV / 漸進 PAL)
    //   Step3 鏡片特性 (基本/UV420/PhotoShade/染色鏡片/PH變色/近視控制/POL)
    //   — 染色鏡片、近視控制、POL 偏光：只限單光 (SV)
    //   — PhotoShade：SV/PAL 皆有，PAL 底下自動使用 RX 訂製 (冇「鏡片類型」呢步)
    // ============================================================

    // ---- 共用資料 ----

    // PhotoShade 真實色彩按鈕樣式定義 (仿鏡片變色後的效果)
    const colorStyles = {
        "Pebble": { label: "Pebble (灰)", bg: "bg-slate-200 text-slate-800", active: "bg-slate-500 border-slate-700 text-white font-black ring-2 ring-slate-200" },
        "Hojicha": { label: "Hojicha (棕)", bg: "bg-amber-100 text-amber-900", active: "bg-amber-600 border-amber-800 text-white font-black ring-2 ring-amber-100" },
        "Matcha": { label: "Matcha (綠)", bg: "bg-emerald-100 text-emerald-900", active: "bg-emerald-600 border-emerald-800 text-white font-black ring-2 ring-emerald-100" },
        "Indigo": { label: "Indigo (藍)", bg: "bg-sky-100 text-sky-800", active: "bg-sky-500 border-sky-700 text-white font-black ring-2 ring-sky-100" },
        "Sakura": { label: "Sakura (粉)", bg: "bg-rose-100 text-rose-800", active: "bg-rose-400 border-rose-600 text-white font-black ring-2 ring-rose-100" },
        "Lavender": { label: "Lavender (紫)", bg: "bg-purple-100 text-purple-800", active: "bg-purple-500 border-purple-700 text-white font-black ring-2 ring-purple-100" }
    };

    // PhotoShade 顏色編碼對應碼
    const colorCodeLetter = {
        "Pebble": "G", "Hojicha": "B", "Matcha": "R", "Indigo": "L", "Sakura": "N", "Lavender": "P"
    };

    // 染色鏡片：HKO 鏡片代碼查表 (依 供應/折射率/鍍膜)
    const tintedLensCodes = {
        Stock: {
            '1.6':  { ETC: 'FOD6ASFNUET', UV420_ETC: 'A16ASK3ETC',   UTC: 'A16ASUVUTC',   UV420_UTC: 'A16ASK3UTC'   },
            '1.67': { ETC: 'FOD7ASFNUET', UV420_ETC: 'A67ASK3ETC',   UTC: 'A67ASUVUTC',   UV420_UTC: 'A67ASK3UTC'   }
        },
        RX: {
            '1.6':  { ETC: 'RXA161ASUVETC', UV420_ETC: 'RXA16BASK3ETC', UTC: 'RXA16ASUVUTC', UV420_UTC: 'RXA16BASK3UTC' },
            '1.67': { ETC: 'RXA167ASUVETC', UV420_ETC: 'RXA67BASK3ETC', UTC: 'RXA67ASUVUTC', UV420_UTC: 'RXA67BASK3UTC' }
        }
    };

    // 染色鏡片：Owndays 顏色列表 [顏色名稱, 顏色代碼]
    const tintedColors = [
        ["CL-Yellow", "ODYL05F"], ["COPR85", "COPR85F"], ["CS-Blue", "ODBL14F"], ["DGY85", "ODGY85F"],
        ["FORE50", "FORE50F"], ["FORE85", "FORE85F"], ["MG-Gray", "ODMG49F"], ["RB-04", "ODRB44F"],
        ["RB-06", "ODRB70F"], ["RBL-04", "ODYG40F"], ["RBL-05", "ODYU45F"], ["RG-03", "ODRG25F"],
        ["RG-06", "ODBG45F"], ["RG-12", "ODRG85F"], ["RO-02", "ODRO20F"], ["RP-03", "ODYR35F"],
        ["RS-09", "ODRS68F"], ["RV-01", "ODYP20F"], ["RV-02", "ODYN34F"], ["SMOK85", "SMOK85F"],
        ["V-G01", "ODDP60F"], ["SMOK85G", "SMOK85G"], ["FORE85G", "FORE85G"], ["COPR85G", "COPR85G"],
        ["V-G01G", "ODYP65G"], ["RP-03G", "ODRN28G"], ["DGY85G", "ODGY85G"],
        ["來片對單色", "對單色"], ["來片對雙色", "對雙色"]
    ];

    // 單光 (SV) 散光度數資料庫
    const svDB = {
        '160': {
            extCyl: { code: 'FOD6ASFNUHM', min: 225, max: 300 },
            rx:     { code: 'RXA161ASUVETC', min: 300, hyperopeMin: 200 },
            ph:     { code: 'FOD6ASFNGHM', max: 200 },
            pol:    { colors: { '灰': 'RXA16BASPLGYETC', '茶': 'RXA16BASPLBRETC' } },
            uv420: {
                nonJpn: { low: 'A16ASK3ETC', high: 'RXA16BASK3ETC' },
                jpn:    { low: 'FOD6ASFU3ET', high: 'XOD6ASBU3ET' }
            }
        },
        '167': {
            extCyl: { code: 'FOD7ASFNUET', min: 225, max: 300 },
            rx:     { code: 'RXA167ASUVETC', min: 300, hyperopeMin: 200 },
            uv420: {
                nonJpn: { low: 'A67ASK3ETC', high: 'RXA67BASK3ETC' },
                jpn:    { low: 'FOD7ASFU3ET', high: 'XOD7ASBU3ET' },
                das:    { low: 'FOD7ASDU3ET', high: 'XOD7ASDU3ET' }
            }
        },
        '174': {
            extCyl: { code: 'FOD8ASFNUET', min: 225, max: 300 },
            rx:     { code: 'RXA174ASUVETC', min: 300, hyperopeMin: 200 },
            uv420: {
                nonJpn: { all: 'RXA74BASU3ETC' },
                jpn:    { low: 'FOD8ASFU3ET', high: 'XOD8ASBU3PE', disputed: true },
                das:    { low: 'FOD8ASDU3ET', high: 'XOD8ASDU3ET' }
            }
        }
    };

    // 漸進 (PAL) 資料庫
    const palDB = {
        '160': {
            basic:    { '07': 'POD6ESSNUET07', '09': 'POD6ESSNUET09' },
            uv420:    { '07': 'POD6ESSN3ET07', '09': 'POD6ESSN3ET09' },
            uv420Jpn: { '07': 'POD6ESSU3ET07', '09': 'POD6ESSU3ET09' },
            ph: {
                '灰': { '07': 'POD6ESSIGET07', '09': 'POD6ESSIGET09' },
                '棕': { '07': 'POD6ESSIBET07', '09': 'POD6ESSIBET09' }
            }
        },
        '167': {
            basic:    { '07': 'POD7ESSNUET07', '09': 'POD7ESSNUET09' },
            uv420:    { '07': 'POD7ESSN3ET07', '09': 'POD7ESSN3ET09' },
            uv420Jpn: { '07': 'POD7ESSU3ET07', '09': 'POD7ESSU3ET09' },
            ph: {
                '灰': { '07': 'POD7ESSIGET07', '09': 'POD7ESSIGET09' },
                '棕': { '07': 'POD7ESSIBET07', '09': 'POD7ESSIBET09' }
            }
        },
        '174': {
            basic:    { '07': 'POD8ESSNUET07', '09': 'POD8ESSNUET09' },
            uv420Jpn: { '07': 'POD8ESSU3ET07', '09': 'POD8ESSU3ET09' }
        }
    };

    // 近視控制 (Myopia Control) 資料庫 — 已併入單光鏡片特性
    const myDB = {
        '160': { basic: 'POD6MYLNUET', uv420: 'POD6MYLN3ET', ph: { '灰': 'POD6MYLIGET', '棕': 'POD6MYLIBET' } },
        '167': { basic: 'POD7MYLNUET', uv420: 'POD7MYLN3ET', ph: { '灰': 'POD7MYLIGET', '棕': 'POD7MYLIBET' } }
    };

    // ---- 統一狀態 ----
    // 新流程：折射率 → 鏡片系列 (SV/PAL) → 鏡片特性
    const stepOrder = [
        'index', 'category',
        'feature', 'myFeature', 'jpn', 'das', 'color', 'astigBand', 'corridor',
        'psSupply', 'psDesign', 'psCoating', 'psColor',
        'tSupply', 'tCoatingBase', 'tColor'
    ];

    let state = {
        category: null, index: null,
        feature: null, myFeature: null, jpn: null, das: null, color: null, astigBand: null, corridor: null, hyperope: false,
        psSupply: null, psDesign: null, psCoating: null, psColor: null,
        tSupply: null, tCoatingBase: null, tUv420: false, tColor: null
    };

    function setState(field, value) {
        const i = stepOrder.indexOf(field);
        state[field] = value;
        for (let k = i + 1; k < stepOrder.length; k++) state[stepOrder[k]] = null;
        if (field === 'index' || field === 'category') { state.hyperope = false; state.tUv420 = false; }
        render();
    }

    function onHyperopeToggle() { state.hyperope = !state.hyperope; render(); }
    function toggleTUv420() { state.tUv420 = !state.tUv420; render(); }

    function idxShort(index) { return index === '160' ? '6' : '7'; }
    function idxDot(index) { return index === '160' ? '1.6' : '1.67'; }

    // ---- UI 組件 (字串渲染) ----

    function stepLabel(n, title) {
        return `<label class="block font-bold text-slate-700 mb-1 text-sm mt-2.5">${n}. ${title}</label>`;
    }

    function btnGroup(field, options, current) {
        return `<div class="grid grid-cols-2 gap-1.5">` + options.map(([val, label]) => {
            const active = current === val;
            const cls = active
                ? "p-2 border rounded-lg font-bold transition text-center bg-blue-50 border-blue-500 text-blue-600 shadow-xs ring-2 ring-blue-100 cursor-pointer"
                : "p-2 border border-slate-200 rounded-lg font-semibold transition text-center bg-white hover:bg-slate-50 cursor-pointer";
            return `<button type="button" onclick="setState('${field}','${val}')" class="${cls}">${label}</button>`;
        }).join('') + `</div>`;
    }

    // 散光度數卡片：2 張 (低/高) 或 3 張 (低/中/高)
    function astigBandGroup(bands, current) {
        const cols = bands.length === 3 ? 'grid-cols-3' : 'grid-cols-2';
        return `<div class="grid ${cols} gap-1.5">` + bands.map(([val, label]) => {
            const active = current === val;
            const cls = active
                ? "p-2 border rounded-lg font-bold transition text-center bg-blue-50 border-blue-500 text-blue-600 shadow-xs ring-2 ring-blue-100 cursor-pointer"
                : "p-2 border border-slate-200 rounded-lg font-semibold transition text-center bg-white hover:bg-slate-50 cursor-pointer";
            return `<button type="button" onclick="setState('astigBand','${val}')" class="${cls}">${label}</button>`;
        }).join('') + `</div>`;
    }

    // PhotoShade 顏色色塊 (仿鏡片變色視覺效果)
    function colorSwatchGroup(field, colors, current) {
        return `<div class="grid grid-cols-3 sm:grid-cols-6 gap-1.5">` + colors.map(c => {
            const style = colorStyles[c];
            const cls = current === c
                ? `p-2 border rounded-lg text-center shadow-md transition cursor-pointer ${style.active}`
                : `p-2 border border-slate-200 rounded-lg text-center font-semibold transition cursor-pointer ${style.bg} hover:brightness-95`;
            return `<button type="button" onclick="setState('${field}','${c}')" class="${cls}">${style.label}</button>`;
        }).join('') + `</div>`;
    }

    // 染色鏡片鍍膜卡：ETC 與 UTC 互斥，UV420 獨立可同時選中
    function tintedCoatingGroup(current, uv420) {
        const mk = (val, label, active, onclick) => {
            const cls = active
                ? "p-2 border rounded-lg font-bold transition text-center bg-blue-50 border-blue-500 text-blue-600 shadow-xs ring-2 ring-blue-100 cursor-pointer"
                : "p-2 border border-slate-200 rounded-lg font-semibold transition text-center bg-white hover:bg-slate-50 cursor-pointer";
            return `<button type="button" onclick="${onclick}" class="${cls}">${label}</button>`;
        };
        return `<div class="grid grid-cols-3 gap-1.5">` +
            mk('ETC', '基本 (ETC)', current === 'ETC', "setState('tCoatingBase','ETC')") +
            mk('UV420', 'UV420', uv420, "toggleTUv420()") +
            mk('UTC', '抗刮 (UTC)', current === 'UTC', "setState('tCoatingBase','UTC')") +
            `</div>`;
    }

    // 通用下拉選單 (Owndays 顏色用)
    function selectField(field, options, current, placeholder) {
        return `<select onchange="setState('${field}', this.value)"
            class="w-full p-2 border border-slate-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none cursor-pointer">
            <option value="" disabled ${current ? '' : 'selected'}>${placeholder}</option>
            ${options.map(([v, label]) => `<option value="${v}" ${current === v ? 'selected' : ''}>${label}</option>`).join('')}
        </select>`;
    }

    // ---- 主渲染流程 ----
    function render() {
        const container = document.getElementById('stepsContainer');
        let html = '';
        let n = 1;

        // Step 1：折射率
        html += stepLabel(n++, '折射率 (Index)');
        html += btnGroup('index', [['160', '1.60'], ['167', '1.67'], ['174', '1.74']], state.index);
        if (!state.index) { container.innerHTML = html; hideResult(); return; }

        // Step 2：鏡片系列
        html += stepLabel(n++, '鏡片系列');
        html += btnGroup('category', [['SV', '單光 SV'], ['PAL', '漸進 PAL']], state.category);
        if (!state.category) { container.innerHTML = html; hideResult(); return; }

        // Step 3：鏡片特性 (基本/UV420/PhotoShade/染色鏡片/PH變色/近視控制/POL)
        // 染色鏡片、近視控制、POL 偏光 只限單光 SV；PhotoShade/PH變色 174 冇資料
        let featureOptions = [['basic', '基本'], ['uv420', 'UV420']];
        if (state.index !== '174') featureOptions.push(['ps', 'PhotoShade']);
        if (state.category === 'SV' && state.index !== '174') featureOptions.push(['tinted', '染色鏡片']);
        if ((state.category === 'SV' && state.index === '160') || (state.category === 'PAL' && state.index !== '174')) {
            featureOptions.push(['ph', 'PH 變色']);
        }
        if (state.category === 'SV' && state.index !== '174') featureOptions.push(['myopia', '近視控制']);
        if (state.category === 'SV' && state.index === '160') featureOptions.push(['pol', 'POL 偏光']);

        html += stepLabel(n++, '鏡片特性');
        html += btnGroup('feature', featureOptions, state.feature);
        if (!state.feature) { container.innerHTML = html; hideResult(); return; }

        // ---- SV 分支 (含近視控制) ----
        if (state.category === 'SV' && state.feature !== 'ps' && state.feature !== 'tinted') {
            if (state.feature === 'myopia') {
                html += stepLabel(n++, '近視控制 - 鏡片特性');
                html += btnGroup('myFeature', [['basic', '基本'], ['uv420', 'UV420 防藍光'], ['ph', 'PH 變色']], state.myFeature);
                if (!state.myFeature) { container.innerHTML = html; hideResult(); return; }

                if (state.myFeature === 'ph') {
                    html += stepLabel(n++, '顏色');
                    html += btnGroup('color', [['灰', '灰色'], ['棕', '棕色']], state.color);
                    if (!state.color) { container.innerHTML = html; hideResult(); return; }
                }
            } else {
                if (state.feature === 'uv420') {
                    html += stepLabel(n++, '是否日本製 (JPN)');
                    html += btnGroup('jpn', [['no', '否 (一般)'], ['yes', '是 (日本製)']], state.jpn);
                    if (!state.jpn) { container.innerHTML = html; hideResult(); return; }

                    if (state.jpn === 'yes' && (state.index === '167' || state.index === '174')) {
                        html += stepLabel(n++, '是否雙非面 (DAS)');
                        html += btnGroup('das', [['no', '否'], ['yes', '是']], state.das);
                        if (!state.das) { container.innerHTML = html; hideResult(); return; }
                    }
                }

                if (state.feature === 'pol') {
                    html += stepLabel(n++, '顏色');
                    html += btnGroup('color', [['灰', '灰色'], ['茶', '茶色']], state.color);
                    if (!state.color) { container.innerHTML = html; hideResult(); return; }
                }

                const skip174NonJpnUv420 = (state.feature === 'uv420' && state.jpn === 'no' && state.index === '174');
                const needAstigCards = (state.feature === 'basic') || (state.feature === 'uv420' && !skip174NonJpnUv420);

                if (needAstigCards) {
                    html += stepLabel(n++, '散光度數');
                    if (state.feature === 'basic') {
                        html += astigBandGroup([
                            ['low', '-200度或以下'], ['mid', '-225至-300度'], ['high', '-325或以上']
                        ], state.astigBand);
                        html += `<label class="flex items-center gap-2 mt-1.5 text-sm text-slate-600 cursor-pointer">
                            <input type="checkbox" ${state.hyperope ? 'checked' : ''} onchange="onHyperopeToggle()" class="w-4 h-4" />
                            處方同時有遠視 (Plus 度數)
                        </label>`;
                    } else {
                        html += astigBandGroup([
                            ['low', '-200度或以下'], ['high', '-225或以上']
                        ], state.astigBand);
                    }
                    if (!state.astigBand) { container.innerHTML = html; hideResult(); return; }
                }
            }
        }

        // ---- PAL 分支 ----
        if (state.category === 'PAL' && state.feature !== 'ps') {
            if (state.feature === 'ph') {
                html += stepLabel(n++, '顏色');
                html += btnGroup('color', [['灰', '灰色'], ['棕', '棕色']], state.color);
                if (!state.color) { container.innerHTML = html; hideResult(); return; }
            }

            if (state.feature === 'uv420' && state.index !== '174') {
                html += stepLabel(n++, '是否日本製 (JPN)');
                html += btnGroup('jpn', [['no', '否 (一般)'], ['yes', '是 (日本製)']], state.jpn);
                if (!state.jpn) { container.innerHTML = html; hideResult(); return; }
            }

            html += stepLabel(n++, '漸進走廊 (Corridor)');
            html += btnGroup('corridor', [['07', '07'], ['09', '09']], state.corridor);
            if (!state.corridor) { container.innerHTML = html; hideResult(); return; }
        }

        // ---- PhotoShade 分支 (SV/PAL 共用) ----
        if (state.feature === 'ps') {
            let effSupply = 'RX';
            if (state.category === 'SV') {
                html += stepLabel(n++, '供應類型');
                html += btnGroup('psSupply', [['Stock', '庫存 (Stock)'], ['RX', '訂製 (RX)']], state.psSupply);
                if (!state.psSupply) { container.innerHTML = html; hideResult(); return; }
                effSupply = state.psSupply;
            }

            if (state.category === 'PAL') {
                html += stepLabel(n++, '漸進系列設計');
                html += btnGroup('psDesign', [['Progressive', 'Progressive'], ['Premium', 'Premium Steady']], state.psDesign);
                if (!state.psDesign) { container.innerHTML = html; hideResult(); return; }
            }

            html += stepLabel(n++, '鍍膜 (Coating)');
            const coatingOptions = (effSupply === 'Stock')
                ? [['ETC', 'ETC (基本 HMC 鍍膜)']]
                : [['ETC', 'ETC (基本 HMC 鍍膜)'], ['UTC', 'UTC (SRC 強化抗刮)'], ['UDC', 'UDC (SRC WH 低反光強化抗刮)']];
            html += btnGroup('psCoating', coatingOptions, state.psCoating);
            if (!state.psCoating) { container.innerHTML = html; hideResult(); return; }

            html += stepLabel(n++, '選擇變色色彩');
            const psColors = (effSupply === 'Stock')
                ? ["Pebble", "Hojicha"]
                : ["Pebble", "Hojicha", "Matcha", "Indigo", "Sakura", "Lavender"];
            html += colorSwatchGroup('psColor', psColors, state.psColor);
            if (!state.psColor) { container.innerHTML = html; hideResult(); return; }
        }

        // ---- 染色鏡片 (Tinted) 分支 (只限單光 SV) ----
        if (state.feature === 'tinted') {
            html += stepLabel(n++, '供應類型');
            html += btnGroup('tSupply', [['Stock', '庫存 (Stock)'], ['RX', '訂製 (RX)']], state.tSupply);
            if (!state.tSupply) { container.innerHTML = html; hideResult(); return; }

            html += stepLabel(n++, '鍍膜 (Coating)');
            html += tintedCoatingGroup(state.tCoatingBase, state.tUv420);
            if (!state.tCoatingBase) { container.innerHTML = html; hideResult(); return; }

            html += stepLabel(n++, 'Owndays 顏色');
            html += selectField('tColor', tintedColors.map(([name, code]) => [code, `${name} (${code})`]), state.tColor, '請選擇');
            if (!state.tColor) { container.innerHTML = html; hideResult(); return; }
        }

        container.innerHTML = html;
        renderResult();
    }

    // ---- 各分支的代碼運算 ----

    function computeSVResult() {
        const idx = state.index;
        const db = svDB[idx];

        if (state.feature === 'myopia') return computeMYResult();

        if (state.feature === 'ph') {
            return { code: db.ph.code, note: '散光-200或以下 (PH 灰)' };
        }

        if (state.feature === 'pol') {
            if (!state.color) return { status: 'need_color' };
            return { code: db.pol.colors[state.color], note: 'POL 偏光 ' + state.color + '色' };
        }

        if (state.feature === 'basic') {
            if (!state.astigBand) return { status: 'need_astig' };
            if (state.astigBand === 'mid') {
                return { code: db.extCyl.code, note: `左右眼散光在 ${db.extCyl.min}-${db.extCyl.max} 內` };
            }
            if (state.astigBand === 'low') {
                if (state.hyperope) return { code: db.rx.code, note: `遠視+散光 ${db.rx.hyperopeMin} 以上` };
                return { code: db.rx.code, note: '散光-200或以下' };
            }
            return { code: db.rx.code, note: `散光 ${db.rx.min} 以上` };
        }

        if (state.feature === 'uv420') {
            if (!state.jpn) return { status: 'need_jpn' };

            if (state.jpn === 'no') {
                if (idx === '174') {
                    return { code: db.uv420.nonJpn.all, note: '所有散光度數同一編號' };
                }
                if (!state.astigBand) return { status: 'need_astig' };
                if (state.astigBand === 'low') return { code: db.uv420.nonJpn.low, note: '散光-200或以下' };
                return { code: db.uv420.nonJpn.high, note: '散光-225或以上' };
            }

            const dasAvailable = (idx === '167' || idx === '174');
            if (dasAvailable && !state.das) return { status: 'need_das' };
            const useDas = dasAvailable && state.das === 'yes';
            const branch = useDas ? db.uv420.das : db.uv420.jpn;
            if (!state.astigBand) return { status: 'need_astig' };
            if (state.astigBand === 'low') return { code: branch.low, note: '散光-200或以下' };
            const warn = branch.disputed ? '⚠ 資料來源有分歧 (PE/RE)，請人手核對' : null;
            return { code: branch.high, note: '散光-225或以上', warn };
        }

        return null;
    }

    function computePALResult() {
        const idx = state.index;
        const db = palDB[idx];
        let base = null;

        if (state.feature === 'basic') base = db.basic;
        else if (state.feature === 'uv420') {
            if (idx === '174') {
                base = db.uv420Jpn;
            } else {
                if (!state.jpn) return { status: 'need_jpn' };
                base = state.jpn === 'yes' ? db.uv420Jpn : db.uv420;
            }
        }
        else if (state.feature === 'ph') {
            if (!state.color) return { status: 'need_color' };
            base = db.ph ? db.ph[state.color] : null;
        }

        if (!base) return { status: 'no_match', note: '此折射率未有此特性嘅編號' };
        if (!state.corridor) return null;
        return { code: base[state.corridor], note: state.corridor + ' 走廊' };
    }

    function computeMYResult() {
        const idx = state.index;
        const db = myDB[idx];
        if (!db) return { status: 'no_match', note: '此折射率未有近視控制編號' };

        if (!state.myFeature) return { status: 'need_astig' };
        if (state.myFeature === 'basic') return { code: db.basic };
        if (state.myFeature === 'uv420') return { code: db.uv420 };
        if (state.myFeature === 'ph') {
            if (!state.color) return { status: 'need_color' };
            return { code: db.ph[state.color] };
        }
        return null;
    }

    function computePSResult() {
        const effType = state.category === 'PAL' ? 'Progressive' : 'Single';
        const effSupply = state.category === 'PAL' ? 'RX' : state.psSupply;

        if (state.category === 'SV' && !state.psSupply) return { status: 'need_supply' };
        if (effType === 'Progressive' && !state.psDesign) return { status: 'need_design' };
        if (!state.psCoating) return { status: 'need_coating' };
        if (!state.psColor) return { status: 'need_color' };

        const cLetter = colorCodeLetter[state.psColor];
        const idxS = idxShort(state.index);
        let code = '';

        if (effType === 'Single') {
            if (effSupply === 'Stock') {
                code = `FOD${idxS}ASF3${cLetter}ET`;
            } else {
                const coatShort = state.psCoating === 'ETC' ? 'ET' : (state.psCoating === 'UTC' ? 'UT' : 'UD');
                code = `XOD${idxS}ASB3${cLetter}${coatShort}`;
            }
        } else {
            const designCode = state.psDesign === 'Progressive' ? 'IDS3' : 'ESS3';
            const suffix = state.psDesign === 'Progressive' ? '11' : '09';
            const coatShort = state.psCoating === 'ETC' ? 'ET' : (state.psCoating === 'UTC' ? 'UT' : 'UD');
            code = `POD${idxS}${designCode}${cLetter}${coatShort}${suffix}`;
        }

        return { code, kind: 'single' };
    }

    function computeTResult() {
        if (!state.tSupply) return { status: 'need_supply' };
        if (!state.tCoatingBase) return { status: 'need_coating' };
        if (!state.tColor) return { status: 'need_color' };

        const key = (state.tUv420 ? 'UV420_' : '') + state.tCoatingBase;
        const lensCode = tintedLensCodes[state.tSupply][idxDot(state.index)][key];
        return { code: lensCode, colorCode: state.tColor, kind: 'tinted' };
    }

    // ---- 結果顯示 ----

    function renderResult() {
        if (!state.category || !state.index || !state.feature) { hideResult(); return; }

        let result = null;
        if (state.feature === 'ps') result = computePSResult();
        else if (state.feature === 'tinted') result = computeTResult();
        else if (state.category === 'SV') result = computeSVResult();
        else if (state.category === 'PAL') result = computePALResult();

        if (!result) { hideResult(); return; }

        const promptMap = {
            need_astig: '請先選擇散光度數',
            need_color: '請先選擇顏色',
            need_jpn: '請先選擇是否日本製',
            need_das: '請先選擇是否雙非面',
            need_supply: '請先選擇供應類型',
            need_design: '請先選擇漸進系列設計',
            need_coating: '請先選擇鍍膜'
        };
        if (result.status && promptMap[result.status]) { showPrompt(promptMap[result.status]); return; }
        if (result.status === 'no_match') { showPrompt(result.note || '此度數暫未有對應編號，請人手核對'); return; }

        if (result.kind === 'tinted') { showTintedResult(result.code, result.colorCode); return; }
        if (result.code) { showResult(result.code, result.note, result.warn); return; }

        hideResult();
    }

    function resetCopyBtn() {
        const copyBtn = document.getElementById('copyBtn');
        const copyBtnText = document.getElementById('copyBtnText');
        copyBtn.className = "mt-2 inline-flex items-center justify-center bg-slate-700 hover:bg-slate-800 text-white font-bold py-1.5 px-6 rounded-lg transition duration-150 text-sm cursor-pointer";
        copyBtnText.textContent = "複製編號";
    }

    function showResult(code, note, warn) {
        document.getElementById('resultSingleWrapper').classList.remove('hidden');
        document.getElementById('resultTintedWrapper').classList.add('hidden');
        document.getElementById('resultLabel').textContent = '對應 HKO 鏡片編號';
        document.getElementById('resultCode').textContent = code;
        document.getElementById('resultNote').textContent = (note || '') + (warn ? '　' + warn : '');
        resetCopyBtn();
        document.getElementById('resultBox').classList.remove('hidden');
    }

    function showTintedResult(lensCode, colorCode) {
        document.getElementById('resultSingleWrapper').classList.add('hidden');
        document.getElementById('resultTintedWrapper').classList.remove('hidden');
        document.getElementById('resultLensCode').textContent = lensCode;
        document.getElementById('resultColorCode').textContent = colorCode;
        document.getElementById('resultNote').textContent = '';
        resetCopyBtn();
        document.getElementById('resultBox').classList.remove('hidden');
    }

    function showPrompt(msg) {
        document.getElementById('resultSingleWrapper').classList.remove('hidden');
        document.getElementById('resultTintedWrapper').classList.add('hidden');
        document.getElementById('resultLabel').textContent = msg;
        document.getElementById('resultCode').textContent = '------';
        document.getElementById('resultNote').textContent = '';
        document.getElementById('resultBox').classList.remove('hidden');
    }

    function hideResult() {
        document.getElementById('resultBox').classList.add('hidden');
    }

    function copyToClipboard() {
        const copyBtn = document.getElementById("copyBtn");
        const copyBtnText = document.getElementById("copyBtnText");
        const isTinted = !document.getElementById('resultTintedWrapper').classList.contains('hidden');
        const codeText = isTinted
            ? document.getElementById("resultLensCode").textContent
            : document.getElementById("resultCode").textContent;

        navigator.clipboard.writeText(codeText).then(() => {
            copyBtn.className = "mt-2 inline-flex items-center justify-center bg-green-600 hover:bg-green-700 text-white font-bold py-1.5 px-6 rounded-lg transition duration-150 text-sm cursor-pointer";
            copyBtnText.textContent = "✓ 已複製";
        }).catch(() => {
            alert("複製失敗");
        });
    }

    // ---- 電腦使用時固定字體大小，卡片過高就用捲軸 ----
    function fitCardToScreen() {
        const card = document.getElementById('mainCard');
        if (!card) return;
        card.style.transform = 'none';
        card.style.maxHeight = '';
        card.style.overflowY = 'auto';
    }

    // ---- 內容變高時自動捲落最底，唔使自己拖 ----
    function scrollCardToBottom() {
        const card = document.getElementById('mainCard');
        if (!card) return;
        if (card.scrollHeight > card.clientHeight) {
            card.scrollTo({ top: card.scrollHeight, behavior: 'smooth' });
        }
    }

    const cardResizeObserver = new ResizeObserver(() => {
        window.requestAnimationFrame(fitCardToScreen);
    });

    // mainCard 本身高度封頂 (max-h-full)，內容變長時唔會觸發 ResizeObserver，
    // 所以要另外監察內容變化 (步驟/結果顯示) 先可以自動捲落底
    const mainCardMutationObserver = new MutationObserver(() => {
        window.requestAnimationFrame(scrollCardToBottom);
    });

    window.addEventListener('load', () => {
        render();
        cardResizeObserver.observe(document.getElementById('mainCard'));
        mainCardMutationObserver.observe(document.getElementById('mainCard'), {
            childList: true, subtree: true, attributes: true, attributeFilter: ['class']
        });
        fitCardToScreen();
    });
    window.addEventListener('resize', fitCardToScreen);
</script>
