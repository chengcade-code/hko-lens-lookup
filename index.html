<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKO 鏡片代碼查詢系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-size: 15px; }
        select, button { font-size: 15px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center justify-center p-3 sm:p-4">

    <div class="bg-white p-4 sm:p-5 rounded-xl shadow-lg w-full max-w-lg border border-slate-100">
        <h1 class="text-xl font-bold text-center text-blue-600 mb-4 tracking-wide">HKO 鏡片代碼查詢系統</h1>
        
        <div class="mb-3">
            <label class="block font-bold text-slate-600 mb-1 text-xs uppercase tracking-wider">鏡片系列</label>
            <div class="grid grid-cols-2 gap-2">
                <button type="button" onclick="selectSeries('PhotoShade')" id="series-PhotoShade" class="py-2 px-3 border rounded-lg font-bold transition text-center bg-blue-50 border-blue-500 text-blue-600 shadow-xs text-sm">PhotoShade 變色</button>
                <button type="button" onclick="selectSeries('Tinted')" id="series-Tinted" class="py-2 px-3 border border-slate-200 rounded-lg font-semibold transition text-center bg-white hover:bg-slate-50 text-sm">染色鏡片 (Tinted)</button>
            </div>
        </div>

        <div class="mb-3">
            <label class="block font-bold text-slate-600 mb-1 text-xs uppercase tracking-wider">1. 折射率 (Index)</label>
            <div class="grid grid-cols-2 gap-2">
                <button type="button" onclick="selectParam('index', '1.6')" id="idx-1.6" class="py-2 border rounded-lg font-bold transition text-center text-sm">1.60</button>
                <button type="button" onclick="selectParam('index', '1.67')" id="idx-1.67" class="py-2 border rounded-lg font-bold transition text-center text-sm">1.67</button>
            </div>
        </div>

        <div class="mb-3">
            <label id="typeLabel" class="block font-bold text-slate-600 mb-1 text-xs uppercase tracking-wider">2. 鏡片類型</label>
            <div id="typeContainer" class="grid grid-cols-2 gap-2">
                <button type="button" onclick="selectParam('type', 'Single')" id="type-Single" class="py-2 border rounded-lg font-bold transition text-center text-sm">單光鏡片 (SV)</button>
                <button type="button" onclick="selectParam('type', 'Progressive')" id="type-Progressive" class="py-2 border rounded-lg font-bold transition text-center text-sm">漸進鏡片 (PAL)</button>
            </div>
            <div id="uv420Container" class="grid grid-cols-2 gap-2 hidden">
                <button type="button" onclick="selectParam('uv420', 'No')" id="uv-No" class="py-2 border rounded-lg font-bold transition text-center text-sm">一般透明</button>
                <button type="button" onclick="selectParam('uv420', 'Yes')" id="uv-Yes" class="py-2 border rounded-lg font-bold transition text-center text-sm">+UV420 藍光</button>
            </div>
        </div>

        <div id="palDesignWrapper" class="mb-3 hidden">
            <label class="block font-bold text-slate-600 mb-1 text-xs uppercase tracking-wider">2.5 漸進系列設計</label>
            <div class="grid grid-cols-2 gap-2">
                <button type="button" onclick="selectParam('design', 'Progressive')" id="ds-Progressive" class="py-2 border rounded-lg font-bold transition text-center text-sm">Progressive</button>
                <button type="button" onclick="selectParam('design', 'Premium')" id="ds-Premium" class="py-2 border rounded-lg font-bold transition text-center text-sm">Premium Steady</button>
            </div>
        </div>

        <div class="mb-3">
            <label class="block font-bold text-slate-600 mb-1 text-xs uppercase tracking-wider">3. 供應類型</label>
            <div class="grid grid-cols-2 gap-2">
                <button type="button" onclick="selectParam('supply', 'Stock')" id="sup-Stock" class="py-2 border rounded-lg font-bold transition text-center text-sm">庫存鏡片 (Stock)</button>
                <button type="button" onclick="selectParam('supply', 'RX')" id="sup-RX" class="py-2 border rounded-lg font-bold transition text-center text-sm">訂做鏡片 (RX)</button>
            </div>
        </div>

        <div class="mb-3">
            <label class="block font-bold text-slate-600 mb-1 text-xs uppercase tracking-wider">4. 鍍膜 (Coating)</label>
            <select id="coatingSelect" class="w-full p-2 border border-slate-300 rounded-lg bg-white shadow-xs focus:ring-2 focus:ring-blue-500 focus:outline-none cursor-pointer text-sm" onchange="hideResult()">
                </select>
        </div>

        <div class="mb-4">
            <label class="block font-bold text-slate-600 mb-1 text-xs uppercase tracking-wider">5. 選擇色彩代碼</label>
            <div id="colorGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                </div>
        </div>

        <button onclick="generateHkoCode()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-2.5 rounded-lg transition duration-200 shadow-md text-base cursor-pointer">
            產生 HKO 鏡片與顏色代碼
        </button>

        <div class="mt-4 p-4 bg-slate-100 rounded-xl text-center hidden" id="resultBox">
            <div id="photoShadeResult" class="hidden">
                <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider">對應 HKO 鏡片完整編號</p>
                <p class="text-2xl font-black text-slate-900 mt-1 tracking-wider select-all" id="resultCode">------</p>
            </div>
            <div id="tintedResult" class="hidden grid grid-cols-2 gap-2 text-left">
                <div class="bg-white p-2 rounded-lg border border-slate-200">
                    <p class="text-[11px] text-slate-400 font-bold">HKO 鏡種代碼 (Lens Code)</p>
                    <p class="text-base font-black text-slate-800 mt-0.5 select-all" id="lensCodeOut">---</p>
                </div>
                <div class="bg-white p-2 rounded-lg border border-slate-200">
                    <p class="text-[11px] text-slate-400 font-bold">HKO 顏色代碼 (Color Code)</p>
                    <p class="text-base font-black text-slate-800 mt-0.5 select-all" id="colorCodeOut">---</p>
                </div>
            </div>
            
            <button id="copyBtn" onclick="copyToClipboard()" class="mt-3 w-full sm:w-auto inline-flex items-center justify-center bg-slate-700 hover:bg-slate-800 text-white font-bold py-1.5 px-6 rounded-lg transition duration-150 text-xs cursor-pointer">
                <span id="copyBtnText">複製資訊</span>
            </button>
        </div>
    </div>

    <script>
        let currentSeries = 'PhotoShade'; // 'PhotoShade' 或 'Tinted'
        let state = {
            index: '1.6', type: 'Single', design: 'Progressive', supply: 'Stock', uv420: 'No', color: ''
        };

        // 樣式對應
        const colorStyles = {
            "Pebble": { label: "Pebble (灰)", bg: "bg-slate-200 text-slate-800", active: "bg-slate-500 border-slate-700 text-white font-black ring-2 ring-slate-200" },
            "Hojicha": { label: "Hojicha (棕)", bg: "bg-amber-100 text-amber-900", active: "bg-amber-600 border-amber-800 text-white font-black ring-2 ring-amber-100" },
            "Matcha": { label: "Matcha (綠)", bg: "bg-emerald-100 text-emerald-900", active: "bg-emerald-600 border-emerald-800 text-white font-black ring-2 ring-emerald-100" },
            "Indigo": { label: "Indigo (藍)", bg: "bg-sky-100 text-sky-800", active: "bg-sky-500 border-sky-700 text-white font-black ring-2 ring-sky-100" },
            "Sakura": { label: "Sakura (粉)", bg: "bg-rose-100 text-rose-800", active: "bg-rose-400 border-rose-600 text-white font-black ring-2 ring-rose-100" },
            "Lavender": { label: "Lavender (紫)", bg: "bg-purple-100 text-purple-800", active: "bg-purple-500 border-purple-700 text-white font-black ring-2 ring-purple-100" },
            // 染色系列常用色
            "CS-Blue": { label: "CS-Blue (藍14%)", bg: "bg-sky-50 text-sky-700", active: "bg-sky-400 border-sky-600 text-white font-black ring-2 ring-sky-100" },
            "DGY85": { label: "DGY85 (灰85%)", bg: "bg-zinc-200 text-zinc-800", active: "bg-zinc-600 border-zinc-800 text-white font-black ring-2 ring-zinc-200" },
            "MG-Gray": { label: "MG-Gray (灰49%)", bg: "bg-slate-200 text-slate-700", active: "bg-slate-500 border-slate-700 text-white font-black ring-2 ring-slate-200" },
            "FORE50": { label: "FORE50 (綠50%)", bg: "bg-teal-50 text-teal-800", active: "bg-teal-500 border-teal-700 text-white font
