<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKO 鏡片代碼查詢系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        html, body { height: 100%; }
        body { font-size: 14px; }
        select, button, input { font-size: 14px !important; }
        #mainCard { transform-origin: center center; }
    </style>
<base target="_blank">
</head>
<body class="bg-slate-50 text-slate-800 h-full flex flex-col items-center justify-center p-2 sm:p-4 overflow-hidden">

    <div id="mainCard" class="bg-white p-3 sm:p-4 rounded-2xl shadow-xl w-full max-w-xl border border-slate-100 max-h-full overflow-y-auto">
        <h1 class="text-xl sm:text-2xl font-extrabold text-center text-blue-600 mb-3 tracking-wide">HKO 鏡片代碼查詢系統</h1>
        <div id="stepsContainer"></div>
        <div class="mt-2.5 p-3 bg-slate-100 rounded-lg text-center hidden" id="resultBox">
            <div id="resultSingleWrapper">
                <p class="text-[15px] text-slate-500 font-semibold tracking-wider uppercase" id="resultLabel">對應 HKO 鏡片編號</p>
                <p class="text-2xl font-black text-slate-900 mt-1 tracking-wider select-all" id="resultCode">------</p>
            </div>
            <div id="resultTintedWrapper" class="hidden">
                <p class="text-[15px] text-slate-500 font-semibold tracking-wider uppercase">鏡片代碼</p>
                <p class="text-2xl font-black text-slate-900 mt-1 tracking-wider select-all" id="resultLensCode">------</p>
                <p class="text-[15px] text-slate-500 font-semibold tracking-wider uppercase mt-2" id="resultColorLabel">Owndays 顏色代碼</p>
                <p class="text-2xl font-black text-slate-900 mt-1 tracking-wider select-all" id="resultColorCode">------</p>
            </div>
            <p class="text-xs text-slate-500 mt-1" id="resultNote"></p>
            <button id="copyBtn" onclick="copyToClipboard()" class="mt-2 inline-flex items-center justify-center bg-slate-700 hover:bg-slate-800 text-white font-bold py-1.5 px-6 rounded-lg transition duration-150 text-sm cursor-pointer">
                <span id="copyBtnText">複製編號</span>
            </button>
        </div>
    </div>

<script>
    // ============================================================
    // HKO 鏡片代碼查詢系統 — 精簡版 v3.1
    // 更新：PhotoShade 鍍膜按鈕移除庫存/訂製標示
    // ============================================================

    const A_CLS = "p-2 border rounded-lg font-bold transition text-center bg-blue-50 border-blue-500 text-blue-600 shadow-xs ring-2 ring-blue-100 cursor-pointer";
    const I_CLS = "p-2 border border-slate-200 rounded-lg font-semibold transition text-center bg-white hover:bg-slate-50 cursor-pointer";

    // ---- 共用資料 ----
    const colorStyles = {
        "Pebble": { label: "Pebble (灰)", bg: "bg-slate-200 text-slate-800", active: "bg-slate-500 border-slate-700 text-white font-black ring-2 ring-slate-200" },
        "Hojicha": { label: "Hojicha (棕)", bg: "bg-amber-100 text-amber-900", active: "bg-amber-600 border-amber-800 text-white font-black ring-2 ring-amber-100" },
        "Matcha": { label: "Matcha (綠)", bg: "bg-emerald-100 text-emerald-900", active: "bg-emerald-600 border-emerald-800 text-white font-black ring-2 ring-emerald-100" },
        "Indigo": { label: "Indigo (藍)", bg: "bg-sky-100 text-sky-800", active: "bg-sky-500 border-sky-700 text-white font-black ring-2 ring-sky-100" },
        "Sakura": { label: "Sakura (粉)", bg: "bg-rose-100 text-rose-800", active: "bg-rose-400 border-rose-600 text-white font-black ring-2 ring-rose-100" },
        "Lavender": { label: "Lavender (紫)", bg: "bg-purple-100 text-purple-800", active: "bg-purple-500 border-purple-700 text-white font-black ring-2 ring-purple-100" }
    };
    const colorCodeLetter = { "Pebble": "G", "Hojicha": "B", "Matcha": "R", "Indigo": "L", "Sakura": "N", "Lavender": "P" };

    const tintedLensCodes = {
        Stock: {
            '1.6':  { ETC: 'FOD6ASFNUET', UV420_ETC: 'A16ASK3ETC', UTC: 'A16ASUVUTC', UV420_UTC: 'A16ASK3UTC' },
            '1.67': { ETC: 'FOD7ASFNUET', UV420_ETC: 'A67ASK3ETC', UTC: 'A67ASUVUTC', UV420_UTC: 'A67ASK3UTC' }
        },
        RX: {
            '1.6':  { ETC: 'RXA161ASUVETC', UV420_ETC: 'RXA16BASK3ETC', UTC: 'RXA16ASUVUTC', UV420_UTC: 'RXA16BASK3UTC' },
            '1.67': { ETC: 'RXA167ASUVETC', UV420_ETC: 'RXA67BASK3ETC', UTC: 'RXA67ASUVUTC', UV420_UTC: 'RXA67BASK3UTC' }
        }
    };

    const tintedColors = [
        ["CL-Yellow","ODYL05F"],["COPR85","COPR85F"],["CS-Blue","ODBL14F"],["DGY85","ODGY85F"],
        ["FORE50","FORE50F"],["FORE85","FORE85F"],["MG-Gray","ODMG49F"],["RB-04","ODRB44F"],
        ["RB-06","ODRB70F"],["RBL-04","ODYG40F"],["RBL-05","ODYU45F"],["RG-03","ODRG25F"],
        ["RG-06","ODBG45F"],["RG-12","ODRG85F"],["RO-02","ODRO20F"],["RP-03","ODYR35F"],
        ["RS-09","ODRS68F"],["RV-01","ODYP20F"],["RV-02","ODYN34F"],["SMOK85","SMOK85F"],
        ["V-G01","ODDP60F"],
        ["來片對單色","對單色"],["來片對雙色","對雙色"]
    ];

    const cheekLensCodes = {};
    const cheekMap = { SV: ['XOD','ASBN',''], Progressive: ['POD','IDSN','11'], Premium: ['POD','ESSN','11'] };
    for (const [ser, [pre, mid, sfx]] of Object.entries(cheekMap)) {
        cheekLensCodes[ser] = {};
        for (const idx of ['160','167']) {
            const i = idx === '160' ? '6' : '7';
            cheekLensCodes[ser][idx] = {};
            for (const coat of ['ETC','UTC','UDC']) {
                const c0 = coat[0], c1 = coat[1];
                cheekLensCodes[ser][idx][coat] = `${pre}${i}${mid}U${c0}${c1}${sfx}`;
                cheekLensCodes[ser][idx][`UV420_${coat}`] = `${pre}${i}${mid}3${c0}${c1}${sfx}`;
            }
        }
    }
    const cheekColorStyles = {
        "Purple": { label: "紫色 Purple", bg: "bg-purple-100 text-purple-800", active: "bg-purple-500 border-purple-700 text-white font-black ring-2 ring-purple-100" },
        "Peach":  { label: "蜜桃色 Peach", bg: "bg-rose-100 text-rose-800", active: "bg-rose-400 border-rose-600 text-white font-black ring-2 ring-rose-100" },
        "Orange": { label: "橙色 Orange", bg: "bg-orange-100 text-orange-800", active: "bg-orange-500 border-orange-700 text-white font-black ring-2 ring-orange-100" }
    };
    const cheekColorCode = { "Purple": "HKPP10R", "Peach": "HKPE10R", "Orange": "HKOR10R" };

    const svDB = {
        '160': {
            extCyl: { code: 'FOD6ASFNUHM', min: 225, max: 300 },
            basicLow: { code: 'FOD6ASFNUET', max: 200 },
            rx:     { code: 'RXA161ASUVETC', min: 300, hyperopeMin: 200 },
            ph:     { code: 'FOD6ASFNGHM', max: 200 },
            pol:    { colors: { '灰': 'RXA16BASPLGYETC', '茶': 'RXA16BASPLBRETC' } },
            uv420: {
                nonJpn: { low: 'A16ASK3ETC', high: 'RXA16BASK3ETC' },
                jpn:    { low: 'FOD6ASFU3ET', high: 'XOD6ASBU3ET' }
            }
        },
        '167': {
            extCyl: { code: 'FOD7ASFNUET', min: 225, max: 300 },
            basicLow: { code: 'FOD7ASFNUET', max: 200 },
            rx:     { code: 'RXA167ASUVETC', min: 300, hyperopeMin: 200 },
            uv420: {
                nonJpn: { low: 'A67ASK3ETC', high: 'RXA67BASK3ETC' },
                jpn:    { low: 'FOD7ASFU3ET', high: 'XOD7ASBU3ET' },
                das:    { low: 'FOD7ASDU3ET', high: 'XOD7ASDU3ET' }
            }
        },
        '174': {
            extCyl: { code: 'FOD8ASFNUET', min: 225, max: 300 },
            basicLow: { code: 'FOD8ASFNUET', max: 200 },
            rx:     { code: 'RXA174ASUVETC', min: 300, hyperopeMin: 200 },
            uv420: {
                nonJpn: { all: 'RXA74BASU3ETC' },
                jpn:    { low: 'FOD8ASFU3ET', high: 'XOD8ASBU3PE', disputed: true },
                das:    { low: 'FOD8ASDU3ET', high: 'XOD8ASDU3ET' }
            }
        }
    };
    const palDB = {
        '160': {
            basic:    { '07': 'POD6ESSNUET07', '09': 'POD6ESSNUET09' },
            uv420:    { '07': 'POD6ESSN3ET07', '09': 'POD6ESSN3ET09' },
            uv420Jpn: { '07': 'POD6ESSU3ET07', '09': 'POD6ESSU3ET09' },
            ph: { '灰': { '07': 'POD6ESSIGET07', '09': 'POD6ESSIGET09' }, '棕': { '07': 'POD6ESSIBET07', '09': 'POD6ESSIBET09' } }
        },
        '167': {
            basic:    { '07': 'POD7ESSNUET07', '09': 'POD7ESSNUET09' },
            uv420:    { '07': 'POD7ESSN3ET07', '09': 'POD7ESSN3ET09' },
            uv420Jpn: { '07': 'POD7ESSU3ET07', '09': 'POD7ESSU3ET09' },
            ph: { '灰': { '07': 'POD7ESSIGET07', '09': 'POD7ESSIGET09' }, '棕': { '07': 'POD7ESSIBET07', '09': 'POD7ESSIBET09' } }
        },
        '174': {
            basic:    { '07': 'POD8ESSNUET07', '09': 'POD8ESSNUET09' },
            uv420Jpn: { '07': 'POD8ESSU3ET07', '09': 'POD8ESSU3ET09' }
        }
    };
    const myDB = {
        '160': { basic: 'POD6MYLNUET', uv420: 'POD6MYLN3ET', ph: { '灰': 'POD6MYLIGET', '棕': 'POD6MYLIBET' } },
        '167': { basic: 'POD7MYLNUET', uv420: 'POD7MYLN3ET', ph: { '灰': 'POD7MYLIGET', '棕': 'POD7MYLIBET' } }
    };

    const PS_STOCK_COLORS = ['Pebble', 'Hojicha'];

    // ---- 統一狀態 ----
    const stepOrder = [
        'index', 'category', 'feature', 'myFeature', 'jpn', 'das', 'color', 'astigBand', 'corridor',
        'psDesign', 'psColor', 'psCoating',
        'tCoatingBase', 'tColor',
        'ccDesign', 'ccCoating', 'ccColor'
    ];
    let state = {
        category: null, index: null, feature: null, myFeature: null, jpn: null, das: null,
        color: null, astigBand: null, corridor: null, hyperope: false,
        psDesign: null, psColor: null, psCoating: null,
        tCoatingBase: null, tUv420: false, tColor: null,
        ccDesign: null, ccCoating: null, ccUv420: false, ccColor: null
    };

    function setState(field, value) {
        const i = stepOrder.indexOf(field);
        state[field] = value;
        for (let k = i + 1; k < stepOrder.length; k++) state[stepOrder[k]] = null;
        if (field === 'index' || field === 'category') { state.hyperope = false; state.tUv420 = false; state.ccUv420 = false; }
        render();
    }
    function onHyperopeToggle() { state.hyperope = !state.hyperope; render(); }
    function toggleTUv420() { state.tUv420 = !state.tUv420; render(); }
    function toggleCcUv420() { state.ccUv420 = !state.ccUv420; render(); }
    function idxShort(index) { return index === '160' ? '6' : '7'; }
    function idxDot(index) { return index === '160' ? '1.6' : '1.67'; }

    // ---- UI 組件 ----
    function mkBtn(txt, onclk, act) {
        return `<button type="button" onclick="${onclk}" class="${act ? A_CLS : I_CLS}">${txt}</button>`;
    }
    function gridBtns(field, opts, cur, cols) {
        const c = { 2: 'grid-cols-2', 3: 'grid-cols-3', 6: 'grid-cols-3 sm:grid-cols-6' }[cols] || 'grid-cols-2';
        return `<div class="grid ${c} gap-1.5">${opts.map(([v, l]) => mkBtn(l, `setState('${field}','${v}')`, cur === v)).join('')}</div>`;
    }
    function stepLbl(n, t) { return `<label class="block font-bold text-slate-700 mb-1 text-sm mt-2.5">${n}. ${t}</label>`; }

    function colorSwatch(field, colors, current, stylesMap) {
        const sm = stylesMap || colorStyles;
        return `<div class="grid grid-cols-3 sm:grid-cols-6 gap-1.5">` + colors.map(c => {
            const s = sm[c];
            const cls = current === c
                ? `p-2 border rounded-lg text-center shadow-md transition cursor-pointer ${s.active}`
                : `p-2 border border-slate-200 rounded-lg text-center font-semibold transition cursor-pointer ${s.bg} hover:brightness-95`;
            return `<button type="button" onclick="setState('${field}','${c}')" class="${cls}">${s.label}</button>`;
        }).join('') + `</div>`;
    }

    function tintedCoatingGroup(cur, uv420) {
        return `<div class="grid grid-cols-3 gap-1.5">` +
            mkBtn('基本 (ETC)', "setState('tCoatingBase','ETC')", cur === 'ETC') +
            mkBtn('UV420', "toggleTUv420()", uv420) +
            mkBtn('抗刮 (UTC)', "setState('tCoatingBase','UTC')", cur === 'UTC') +
        `</div>`;
    }
    function cheekCoatingGroup(cur, uv420) {
        return `<div class="grid grid-cols-2 gap-1.5">` +
            mkBtn('基本 (ETC)', "setState('ccCoating','ETC')", cur === 'ETC') +
            mkBtn('UV420', "toggleCcUv420()", uv420) +
            mkBtn('抗刮 (SRC/UTC)', "setState('ccCoating','UTC')", cur === 'UTC') +
            mkBtn('超透光 (WH/UDC)', "setState('ccCoating','UDC')", cur === 'UDC') +
        `</div>`;
    }

    // ---- 主渲染流程 ----
    function render() {
        const c = document.getElementById('stepsContainer');
        let h = '', n = 1;
        const need = (f) => { if (!state[f]) { c.innerHTML = h; hideResult(); return true; } return false; };

        h += stepLbl(n++, '折射率 (Index)');
        h += gridBtns('index', [['160', '1.60'], ['167', '1.67'], ['174', '1.74']], state.index, 2);
        if (need('index')) return;

        h += stepLbl(n++, '鏡片系列');
        h += gridBtns('category', [['SV', '單光 SV'], ['PAL', '漸進 PAL']], state.category, 2);
        if (need('category')) return;

        let fopts = [['basic', '基本'], ['uv420', 'UV420']];
        if (state.index !== '174') fopts.push(['ps', 'PhotoShade'], ['cheek', '腮紅鏡片']);
        if (state.category === 'SV' && state.index !== '174') fopts.push(['tinted', '染色鏡片']);
        if ((state.category === 'SV' && state.index === '160') || (state.category === 'PAL' && state.index !== '174')) fopts.push(['ph', 'PH 變色']);
        if (state.category === 'SV' && state.index !== '174') fopts.push(['myopia', '近視控制']);
        if (state.category === 'SV' && state.index === '160') fopts.push(['pol', 'POL 偏光']);
        h += stepLbl(n++, '鏡片特性');
        h += gridBtns('feature', fopts, state.feature, 2);
        if (need('feature')) return;

        // SV branch
        if (state.category === 'SV' && state.feature !== 'ps' && state.feature !== 'tinted') {
            if (state.feature === 'myopia') {
                h += stepLbl(n++, '近視控制 - 鏡片特性');
                h += gridBtns('myFeature', [['basic', '基本'], ['uv420', 'UV420 防藍光'], ['ph', 'PH 變色']], state.myFeature, 2);
                if (need('myFeature')) return;
                if (state.myFeature === 'ph') { h += stepLbl(n++, '顏色'); h += gridBtns('color', [['灰', '灰色'], ['棕', '棕色']], state.color, 2); if (need('color')) return; }
            } else {
                if (state.feature === 'uv420') {
                    h += stepLbl(n++, '是否日本製 (JPN)');
                    h += gridBtns('jpn', [['no', '否 (一般)'], ['yes', '是 (日本製)']], state.jpn, 2);
                    if (need('jpn')) return;
                    if (state.jpn === 'yes' && (state.index === '167' || state.index === '174')) {
                        h += stepLbl(n++, '是否雙非面 (DAS)');
                        h += gridBtns('das', [['no', '否'], ['yes', '是']], state.das, 2);
                        if (need('das')) return;
                    }
                }
                if (state.feature === 'pol') { h += stepLbl(n++, '顏色'); h += gridBtns('color', [['灰', '灰色'], ['茶', '茶色']], state.color, 2); if (need('color')) return; }

                const skip174 = (state.feature === 'uv420' && state.jpn === 'no' && state.index === '174');
                const needAstig = (state.feature === 'basic') || (state.feature === 'uv420' && !skip174);
                if (needAstig) {
                    h += stepLbl(n++, '散光度數');
                    if (state.feature === 'basic') {
                        h += gridBtns('astigBand', [['low', '-200度或以下'], ['mid', '-225至-300度'], ['high', '-325或以上']], state.astigBand, 3);
                        h += `<label class="flex items-center gap-2 mt-1.5 text-sm text-slate-600 cursor-pointer"><input type="checkbox" ${state.hyperope ? 'checked' : ''} onchange="onHyperopeToggle()" class="w-4 h-4"/>處方同時有遠視 (Plus 度數)</label>`;
                    } else {
                        h += gridBtns('astigBand', [['low', '-200度或以下'], ['high', '-225或以上']], state.astigBand, 2);
                    }
                    if (need('astigBand')) return;
                }
            }
        }

        // PAL branch
        if (state.category === 'PAL' && state.feature !== 'ps') {
            if (state.feature === 'ph') { h += stepLbl(n++, '顏色'); h += gridBtns('color', [['灰', '灰色'], ['棕', '棕色']], state.color, 2); if (need('color')) return; }
            if (state.feature === 'uv420' && state.index !== '174') { h += stepLbl(n++, '是否日本製 (JPN)'); h += gridBtns('jpn', [['no', '否 (一般)'], ['yes', '是 (日本製)']], state.jpn, 2); if (need('jpn')) return; }
            h += stepLbl(n++, '漸進走廊 (Corridor)');
            h += gridBtns('corridor', [['07', '07'], ['09', '09']], state.corridor, 2);
            if (need('corridor')) return;
        }

        // PhotoShade — 顏色 → 鍍膜（顏色+鍍膜自動決定 Stock/RX，鍍膜按鈕不顯示供應類型）
        if (state.feature === 'ps') {
            if (state.category === 'PAL') { h += stepLbl(n++, '漸進系列設計'); h += gridBtns('psDesign', [['Progressive', 'Progressive'], ['Premium', 'Premium Steady']], state.psDesign, 2); if (need('psDesign')) return; }

            h += stepLbl(n++, '選擇變色色彩');
            h += colorSwatch('psColor', ['Pebble', 'Hojicha', 'Matcha', 'Indigo', 'Sakura', 'Lavender'], state.psColor);
            if (need('psColor')) return;

            h += stepLbl(n++, '鍍膜 (Coating)');
            h += gridBtns('psCoating', [
                ['ETC', 'ETC (基本 HMC 鍍膜)'],
                ['UTC', 'UTC (SRC 強化抗刮)'],
                ['UDC', 'UDC (SRC WH 低反光強化抗刮)']
            ], state.psCoating, 2);
            if (need('psCoating')) return;
        }

        // Cheek Color
        if (state.feature === 'cheek') {
            if (state.category === 'PAL') { h += stepLbl(n++, '漸進系列設計'); h += gridBtns('ccDesign', [['Progressive', 'Progressive'], ['Premium', 'Premium Steady']], state.ccDesign, 2); if (need('ccDesign')) return; }
            h += stepLbl(n++, '鍍膜 (Coating)');
            h += cheekCoatingGroup(state.ccCoating, state.ccUv420);
            if (need('ccCoating')) return;
            h += stepLbl(n++, '腮紅顏色');
            h += colorSwatch('ccColor', ['Purple', 'Peach', 'Orange'], state.ccColor, cheekColorStyles);
            if (need('ccColor')) return;
        }

        // Tinted — 散光自動判斷 Stock/RX，只顯示度數
        if (state.feature === 'tinted') {
            h += stepLbl(n++, '散光度數');
            h += gridBtns('astigBand', [['low', '-200度或以下'], ['high', '-225或以上']], state.astigBand, 2);
            if (need('astigBand')) return;

            h += stepLbl(n++, '鍍膜 (Coating)');
            h += tintedCoatingGroup(state.tCoatingBase, state.tUv420);
            if (need('tCoatingBase')) return;

            h += stepLbl(n++, 'Owndays 顏色');
            h += `<select onchange="setState('tColor',this.value)" class="w-full p-2 border border-slate-300 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none cursor-pointer"><option value="" disabled ${state.tColor ? '' : 'selected'}>請選擇</option>${tintedColors.map(([nm, cd]) => `<option value="${cd}" ${state.tColor === cd ? 'selected' : ''}>${nm} (${cd})</option>`).join('')}</select>`;
            if (need('tColor')) return;
        }

        c.innerHTML = h;
        renderResult();
    }

    // ---- 計算邏輯 ----
    function computeResult() {
        const { category, feature } = state;
        if (feature === 'ps') return computePS();
        if (feature === 'tinted') return computeT();
        if (feature === 'cheek') return computeCC();
        if (category === 'SV') return computeSV();
        if (category === 'PAL') return computePAL();
        return null;
    }

    function computeSV() {
        const { index, feature, astigBand, hyperope, jpn, das, color } = state;
        const db = svDB[index];
        if (feature === 'myopia') return computeMY();
        if (feature === 'ph') return { code: db.ph.code, note: '散光-200或以下 (PH 灰)' };
        if (feature === 'pol') return color ? { code: db.pol.colors[color], note: 'POL 偏光 ' + color + '色' } : { status: 'need_color' };
        if (feature === 'basic') {
            if (!astigBand) return { status: 'need_astig' };
            if (astigBand === 'mid') return { code: db.extCyl.code, note: `左右眼散光在 ${db.extCyl.min}-${db.extCyl.max} 內` };
            if (astigBand === 'low') return hyperope ? { code: db.rx.code, note: `遠視+散光 ${db.rx.hyperopeMin} 以上` } : { code: db.basicLow.code, note: '散光-200或以下' };
            return { code: db.rx.code, note: `散光 ${db.rx.min} 以上` };
        }
        if (feature === 'uv420') {
            if (!jpn) return { status: 'need_jpn' };
            if (jpn === 'no') {
                if (index === '174') return { code: db.uv420.nonJpn.all, note: '所有散光度數同一編號' };
                if (!astigBand) return { status: 'need_astig' };
                return astigBand === 'low' ? { code: db.uv420.nonJpn.low, note: '散光-200或以下' } : { code: db.uv420.nonJpn.high, note: '散光-225或以上' };
            }
            const da = (index === '167' || index === '174');
            if (da && !das) return { status: 'need_das' };
            const br = (da && das === 'yes') ? db.uv420.das : db.uv420.jpn;
            if (!astigBand) return { status: 'need_astig' };
            if (astigBand === 'low') return { code: br.low, note: '散光-200或以下' };
            return { code: br.high, note: '散光-225或以上', warn: br.disputed ? '⚠ 資料來源有分歧 (PE/RE)，請人手核對' : null };
        }
        return null;
    }

    function computePAL() {
        const { index, feature, jpn, color, corridor } = state;
        const db = palDB[index];
        let base = null;
        if (feature === 'basic') base = db.basic;
        else if (feature === 'uv420') base = index === '174' ? db.uv420Jpn : (jpn === 'yes' ? db.uv420Jpn : db.uv420);
        else if (feature === 'ph') base = db.ph?.[color];
        if (!base) return { status: 'no_match', note: '此折射率未有此特性嘅編號' };
        if (!corridor) return null;
        return { code: base[corridor], note: corridor + ' 走廊' };
    }

    function computeMY() {
        const { index, myFeature, color } = state;
        const db = myDB[index];
        if (!db) return { status: 'no_match', note: '此折射率未有近視控制編號' };
        if (!myFeature) return { status: 'need_astig' };
        if (myFeature === 'basic') return { code: db.basic };
        if (myFeature === 'uv420') return { code: db.uv420 };
        if (myFeature === 'ph') return color ? { code: db.ph[color] } : { status: 'need_color' };
        return null;
    }

    // PhotoShade — 顏色+鍍膜自動決定 Stock/RX
    function computePS() {
        const { index, category, psDesign, psColor, psCoating } = state;
        if (category === 'PAL' && !psDesign) return { status: 'need_design' };
        if (!psColor) return { status: 'need_color' };
        if (!psCoating) return { status: 'need_coating' };

        const cL = colorCodeLetter[psColor];
        const iS = idxShort(index);
        const isStock = category === 'SV' && PS_STOCK_COLORS.includes(psColor) && psCoating === 'ETC';

        if (category === 'SV') {
            if (isStock) {
                return { code: `FOD${iS}ASF3${cL}ET`, note: '庫存 (Stock)' };
            }
            const cs = psCoating === 'ETC' ? 'ET' : (psCoating === 'UTC' ? 'UT' : 'UD');
            return { code: `XOD${iS}ASB3${cL}${cs}`, note: '訂製 (RX)' };
        }

        // PAL — 強制 RX
        const dC = psDesign === 'Progressive' ? 'IDS3' : 'ESS3';
        const sfx = psDesign === 'Progressive' ? '11' : '09';
        const cs = psCoating === 'ETC' ? 'ET' : (psCoating === 'UTC' ? 'UT' : 'UD');
        return { code: `POD${iS}${dC}${cL}${cs}${sfx}`, note: '訂製 (RX)' };
    }

    // 染色鏡片：散光自動判斷 Stock/RX
    function computeT() {
        const { astigBand, tCoatingBase, tUv420, tColor, index } = state;
        if (!astigBand) return { status: 'need_astig' };
        const tSupply = astigBand === 'low' ? 'Stock' : 'RX';
        if (!tCoatingBase) return { status: 'need_coating' };
        if (!tColor) return { status: 'need_color' };
        const key = (tUv420 ? 'UV420_' : '') + tCoatingBase;
        return { code: tintedLensCodes[tSupply][idxDot(index)][key], colorCode: tColor, kind: 'tinted' };
    }

    function computeCC() {
        const { index, category, ccDesign, ccCoating, ccUv420, ccColor } = state;
        let tbl;
        if (category === 'SV') tbl = cheekLensCodes.SV[index];
        else { if (!ccDesign) return { status: 'need_design' }; tbl = cheekLensCodes[ccDesign][index]; }
        if (!ccCoating) return { status: 'need_coating' };
        if (!ccColor) return { status: 'need_color' };
        const key = (ccUv420 ? 'UV420_' : '') + ccCoating;
        const code = tbl?.[key];
        if (!code) return { status: 'no_match', note: '此組合暫未有對應編號，請人手核對' };
        return { code, colorCode: cheekColorCode[ccColor], kind: 'cheek' };
    }

    // ---- 結果顯示 ----
    const PROMPT_MAP = {
        need_astig: '請先選擇散光度數', need_color: '請先選擇顏色', need_jpn: '請先選擇是否日本製',
        need_das: '請先選擇是否雙非面', need_supply: '請先選擇供應類型',
        need_design: '請先選擇漸進系列設計', need_coating: '請先選擇鍍膜'
    };

    function renderResult() {
        if (!state.category || !state.index || !state.feature) { hideResult(); return; }
        const res = computeResult();
        if (!res) { hideResult(); return; }
        if (res.status && PROMPT_MAP[res.status]) { showPrompt(PROMPT_MAP[res.status]); return; }
        if (res.status === 'no_match') { showPrompt(res.note || '此度數暫未有對應編號，請人手核對'); return; }
        if (res.kind === 'tinted') { showTinted(res.code, res.colorCode, 'Owndays 顏色代碼'); return; }
        if (res.kind === 'cheek') { showTinted(res.code, res.colorCode, '腮紅色代碼'); return; }
        if (res.code) showResult(res.code, res.note, res.warn);
        else hideResult();
    }

    function setResultMode(mode) {
        document.getElementById('resultSingleWrapper').classList.toggle('hidden', mode !== 'single');
        document.getElementById('resultTintedWrapper').classList.toggle('hidden', mode !== 'tinted');
    }
    function showResult(code, note, warn) {
        setResultMode('single');
        document.getElementById('resultLabel').textContent = '對應 HKO 鏡片編號';
        document.getElementById('resultCode').textContent = code;
        document.getElementById('resultNote').textContent = (note || '') + (warn ? '　' + warn : '');
        resetCopyBtn();
        document.getElementById('resultBox').classList.remove('hidden');
    }
    function showTinted(lens, color, label) {
        setResultMode('tinted');
        document.getElementById('resultLensCode').textContent = lens;
        document.getElementById('resultColorCode').textContent = color;
        document.getElementById('resultColorLabel').textContent = label;
        document.getElementById('resultNote').textContent = '';
        resetCopyBtn();
        document.getElementById('resultBox').classList.remove('hidden');
    }
    function showPrompt(msg) {
        setResultMode('single');
        document.getElementById('resultLabel').textContent = msg;
        document.getElementById('resultCode').textContent = '------';
        document.getElementById('resultNote').textContent = '';
        document.getElementById('resultBox').classList.remove('hidden');
    }
    function hideResult() { document.getElementById('resultBox').classList.add('hidden'); }

    function resetCopyBtn() {
        const btn = document.getElementById('copyBtn'), txt = document.getElementById('copyBtnText');
        btn.className = "mt-2 inline-flex items-center justify-center bg-slate-700 hover:bg-slate-800 text-white font-bold py-1.5 px-6 rounded-lg transition duration-150 text-sm cursor-pointer";
        txt.textContent = "複製編號";
    }
    function copyToClipboard() {
        const btn = document.getElementById('copyBtn'), txt = document.getElementById('copyBtnText');
        const isTinted = !document.getElementById('resultTintedWrapper').classList.contains('hidden');
        const code = isTinted ? document.getElementById('resultLensCode').textContent : document.getElementById('resultCode').textContent;
        navigator.clipboard.writeText(code).then(() => {
            btn.className = "mt-2 inline-flex items-center justify-center bg-green-600 hover:bg-green-700 text-white font-bold py-1.5 px-6 rounded-lg transition duration-150 text-sm cursor-pointer";
            txt.textContent = "✓ 已複製";
        }).catch(() => alert("複製失敗"));
    }

    // ---- 自適應與滾動 ----
    function fitCard() {
        const card = document.getElementById('mainCard');
        if (!card) return;
        card.style.transform = 'none'; card.style.maxHeight = ''; card.style.overflowY = 'auto';
    }
    function scrollCard() {
        const card = document.getElementById('mainCard');
        if (card && card.scrollHeight > card.clientHeight) card.scrollTo({ top: card.scrollHeight, behavior: 'smooth' });
    }
    const resizeObs = new ResizeObserver(() => requestAnimationFrame(fitCard));
    const mutObs = new MutationObserver(() => requestAnimationFrame(scrollCard));

    window.addEventListener('load', () => {
        render();
        resizeObs.observe(document.getElementById('mainCard'));
        mutObs.observe(document.getElementById('mainCard'), { childList: true, subtree: true, attributes: true, attributeFilter: ['class'] });
        fitCard();
    });
    window.addEventListener('resize', fitCard);
</script>
</body>
</html>
