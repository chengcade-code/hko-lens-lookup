<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKO 鏡片編號查詢系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-size: 18px; }
        select, button { font-size: 18px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center justify-center p-4 sm:p-6">

    <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl w-full max-w-xl border border-slate-100">
        <h1 class="text-3xl font-extrabold text-center text-blue-600 mb-8 tracking-wide">HKO 鏡片編號查詢</h1>
        
        <div class="mb-6">
            <label class="block font-bold text-slate-700 mb-2 text-base">鏡片類型</label>
            <select id="lensType" class="w-full p-3.5 border border-slate-300 rounded-xl bg-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none cursor-pointer" onchange="updateFields()">
                <option value="染色鏡片">染色鏡片 (Tinted)</option>
                <option value="腮紅鏡片">腮紅鏡片 (Blush)</option>
                <option value="Photoshade">Photoshade (變色)</option>
            </select>
        </div>

        <div class="mb-6">
            <label class="block font-bold text-slate-700 mb-2 text-base">折射率 (Index)</label>
            <select id="index" class="w-full p-3.5 border border-slate-300 rounded-xl bg-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none cursor-pointer">
                <option value="1.6">1.60</option>
                <option value="1.67">1.67</option>
            </select>
        </div>

        <div class="mb-6">
            <label class="block font-bold text-slate-700 mb-2 text-base">鍍膜 (Coating)</label>
            <select id="coating" class="w-full p-3.5 border border-slate-300 rounded-xl bg-white shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none cursor-pointer">
                <option value="沒有">UC (沒有鍍膜)</option>
                <option value="抗刮">HC (抗刮鍍膜)</option>
                <option value="抗刮+超透光">HMC (抗刮 + 超透光)</option>
            </select>
        </div>

        <div class="mb-6">
            <label class="block font-bold text-slate-700 mb-2 text-base">顏色</label>
            <div id="colorContainer" class="grid grid-cols-2 gap-3">
                </div>
        </div>

        <div class="mb-8 hidden" id="densityWrapper">
            <label class="block font-bold text-slate-700 mb-2 text-base">顏色濃度</label>
            <div id="densityContainer" class="grid grid-cols-4 gap-2">
                </div>
        </div>

        <button onclick="lookupCode()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-4 rounded-xl transition duration-200 shadow-md text-xl cursor-pointer">
            產生鏡片編號
        </button>

        <div class="mt-8 p-6 bg-slate-100 rounded-2xl text-center hidden" id="resultBox">
            <p class="text-sm text-slate-500 font-semibold tracking-wider uppercase">對應 HKO 鏡片編號</p>
            <p class="text-4xl font-black text-slate-900 mt-2 tracking-wider select-all" id="resultCode">------</p>
            
            <button id="copyBtn" onclick="copyToClipboard()" class="mt-4 w-full sm:w-auto inline-flex items-center justify-center bg-slate-700 hover:bg-slate-800 text-white font-bold py-2.5 px-8 rounded-xl transition duration-150 text-base cursor-pointer">
                <span id="copyBtnText">複製編號</span>
            </button>
        </div>
    </div>

    <script>
        const colorMap = {
            "染色鏡片": ["灰", "藍"],
            "腮紅鏡片": ["紅", "橙"],
            "Photoshade": ["灰", "棕"]
        };

        // 定義每種顏色文字對應的 Tailwind 背景色與邊框
        const colorStyles = {
            "灰": { bg: "bg-slate-200 text-slate-800", active: "bg-slate-400 border-slate-600 text-slate-950 font-black ring-4 ring-slate-200" },
            "藍": { bg: "bg-sky-100 text-sky-800", active: "bg-sky-300 border-sky-500 text-sky-950 font-black ring-4 ring-sky-100" },
            "紅": { bg: "bg-rose-100 text-rose-800", active: "bg-rose-300 border-rose-500 text-rose-950 font-black ring-4 ring-rose-100" },
            "橙": { bg: "bg-orange-100 text-orange-800", active: "bg-orange-300 border-orange-500 text-orange-950 font-black ring-4 ring-orange-100" },
            "棕": { bg: "bg-amber-100 text-amber-900", active: "bg-amber-300 border-amber-600 text-amber-950 font-black ring-4 ring-amber-100" }
        };

        const densities = ["85%", "50%", "25%", "15%"];

        let selectedColor = "";
        let selectedDensity = "85%";

        function updateFields() {
            const type = document.getElementById("lensType").value;
            const colorContainer = document.getElementById("colorContainer");
            const densityWrapper = document.getElementById("densityWrapper");
            const densityContainer = document.getElementById("densityContainer");
            
            // 生成具備背景顏色的顏色方塊
            colorContainer.innerHTML = "";
            colorMap[type].forEach((color, idx) => {
                const btn = document.createElement("button");
                btn.type = "button";
                
                // 基礎樣式
                btn.className = `p-4 border border-slate-200 rounded-xl font-semibold transition cursor-pointer text-center ${colorStyles[color].bg}`;
                btn.textContent = color;
                btn.onclick = () => selectColorBox(color, btn);
                
                colorContainer.appendChild(btn);
                
                // 預設選取第一個
                if(idx === 0) {
                    selectColorBox(color, btn);
                }
            });

            // 處理濃度方塊
            if (type === "染色鏡片") {
                densityWrapper.classList.remove("hidden");
                densityContainer.innerHTML = "";
                densities.forEach((ds, idx) => {
                    const btn = document.createElement("button");
                    btn.type = "button";
                    btn.className = `p-2.5 border rounded-xl text-base font-semibold transition cursor-pointer text-center bg-white border-slate-200 hover:bg-slate-50`;
                    btn.textContent = ds;
                    btn.onclick = () => selectDensityBox(ds, btn);
                    densityContainer.appendChild(btn);
                    
                    if(idx === 0) {
                        selectDensityBox(ds, btn);
                    }
                });
            } else {
                densityWrapper.classList.add("hidden");
            }
            
            document.getElementById("resultBox").classList.add("hidden");
        }

        // 專門處理色彩方塊選取的函數
        function selectColorBox(color, element) {
            selectedColor = color;
            
            // 還原所有顏色按鈕到它們的預設淺色狀態
            const siblings = element.parentNode.children;
            const currentTypeColors = colorMap[document.getElementById("lensType").value];
            
            for(let i = 0; i < siblings.length; i++) {
                const cName = currentTypeColors[i];
                siblings[i].className = `p-4 border border-slate-200 rounded-xl font-semibold transition cursor-pointer text-center ${colorStyles[cName].bg} hover:brightness-95`;
            }
            
            // 為選中的按鈕加上專屬的深色高亮與外圈（ring）
            element.className = `p-4 border rounded-xl transition cursor-pointer text-center shadow-md ${colorStyles[color].active}`;
        }

        // 處理濃度方塊選取
        function selectDensityBox(value, element) {
            selectedDensity = value;
            
            const siblings = element.parentNode.children;
            for(let btn of siblings) {
                btn.className = "p-2.5 border rounded-xl text-base font-semibold transition cursor-pointer text-center bg-white border-slate-200 hover:bg-slate-50";
            }
            element.className = `p-2.5 border rounded-xl text-base font-bold transition cursor-pointer text-center bg-blue-50 border-blue-500 text-blue-600 shadow-xs ring-2 ring-blue-100`;
        }

        function lookupCode() {
            const type = document.getElementById("lensType").value;
            const idx = document.getElementById("index").value;
            let finalCode = `HKO-${idx}-${selectedColor}`;
            
            if (type === "染色鏡片") {
                finalCode += `-${selectedDensity}`;
            }

            document.getElementById("resultCode").textContent = finalCode;
            document.getElementById("resultBox").classList.remove("hidden");
            
            // 還原複製按鈕
            const copyBtn = document.getElementById("copyBtn");
            const copyBtnText = document.getElementById("copyBtnText");
            copyBtn.className = "mt-4 w-full sm:w-auto inline-flex items-center justify-center bg-slate-700 hover:bg-slate-800 text-white font-bold py-2.5 px-8 rounded-xl transition duration-150 text-base cursor-pointer";
            copyBtnText.textContent = "複製編號";
        }

        function copyToClipboard() {
            const codeText = document.getElementById("resultCode").textContent;
            const copyBtn = document.getElementById("copyBtn");
            const copyBtnText = document.getElementById("copyBtnText");
            
            navigator.clipboard.writeText(codeText).then(() => {
                copyBtn.className = "mt-4 w-full sm:w-auto inline-flex items-center justify-center bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-8 rounded-xl transition duration-150 text-base cursor-pointer";
                copyBtnText.textContent = "✓ 已成功複製";
            }).catch(err => {
                alert("複製失敗，請手動全選複製。");
            });
        }

        window.onload = updateFields;
    </script>
</body>
</html>
